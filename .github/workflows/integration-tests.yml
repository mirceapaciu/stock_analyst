name: Integration Tests

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: integration-tests-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-ci-dev:
    name: Verify CI Dev Status
    runs-on: ubuntu-latest
    steps:
      - name: Check CI Dev workflow status
        uses: actions/github-script@v7
        with:
          script: |
            const headRef = context.payload.pull_request.head.ref;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            // Get recent workflow runs for CI Dev on the source branch
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: owner,
              repo: repo,
              workflow_id: 'ci-dev.yml',
              branch: headRef,
              status: 'completed'
            });
            
            if (runs.data.workflow_runs.length === 0) {
              throw new Error(`No completed CI Dev runs found on branch '${headRef}'. Please ensure CI Dev passes on your branch first.`);
            }
            
            const latestRun = runs.data.workflow_runs[0];
            if (latestRun.conclusion !== 'success') {
              throw new Error(`Latest CI Dev run on branch '${headRef}' has status '${latestRun.conclusion}'. Integration tests require CI Dev to be successful.`);
            }
            
            core.info(`CI Dev is successful on branch '${headRef}'. Proceeding with integration tests.`);

  integration-tests:
    name: Run Integration Tests
    needs: check-ci-dev
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      FMP_API_KEY: ${{ secrets.FMP_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Sync dependencies
        run: uv sync --locked

      - name: Validate required API secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for key in OPENAI_API_KEY GOOGLE_API_KEY GOOGLE_CSE_ID FINNHUB_API_KEY FMP_API_KEY; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "One or more required secrets are missing. Configure repository or environment secrets before running integration tests."
            exit 1
          fi

      - name: Run integration tests
        run: uv run pytest -m integration --junit-xml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: test-results.xml
